name: Update Hackatime Table

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Hackatime data
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.HACKATIME_API_KEY }}" \
          https://hackatime.hackclub.com/api/hackatime/v1/users/current/stats/last_7_days \
          > data.json

      - name: Generate Markdown table
        run: |
          python3 - << 'EOF'
          import json
          with open("data.json") as f:
              d = json.load(f)['data']

          with open("README.md", "w") as f:
              # Keep your current header & image
              f.write("# Hi, I’m Nedha! 👋\n\n")
              f.write("## 🖥️ Hackatime Stats\n")
              f.write("![Hackatime Stats](https://github-readme-stats.hackclub.dev/api/wakatime?username=30279&api_domain=hackatime.hackclub.com&theme=dark&custom_title=Hackatime+Stats&layout=compact&cache_seconds=0&langs_count=8)\n\n")

              # Add a table for languages
              f.write("### Languages (Detail)\n\n")
              f.write("| Language | Time |\n|----------|------|\n")
              for lang in d['languages']:
                  f.write(f"| {lang['name']} | {lang['text']} |\n")

              # Add a table for projects
              f.write("\n### Projects (Detail)\n\n")
              f.write("| Project | Time |\n|---------|------|\n")
              for proj in d['projects']:
                  f.write(f"| {proj['name']} | {proj['text']} |\n")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update Hackatime table" || echo "No changes"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main

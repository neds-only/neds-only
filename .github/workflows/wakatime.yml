name: WakaTime Readme

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use a stable release of the WakaTime README action
      - uses: athul/waka-readme@v1.1.0   # <-- official release
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          WAKATIME_CLI_VERSION: 14.0.1    # <-- your installed version
          SHOW_TITLE: true
          SHOW_TIME_ZONE: false
          SHOW_LANGUAGE: true
          SHOW_OS: true
          SHOW_PROJECTS: true
          SHOW_EDITORS: true

name: WakaTime Readme

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Step 3: Install WakaTime CLI version 14.0.1
      - name: Install WakaTime CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install wakatime==14.0.1

      # Step 4: Update README with WakaTime stats
      - name: Update README
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          FILE=README.md
          START="<!--START_SECTION:waka-->"
          END="<!--END_SECTION:waka-->"

          # Ensure README has markers
          if ! grep -q "$START" $FILE; then
            echo -e "\n$START\n$END" >> $FILE
          fi

          # Fetch today's coding stats
          STATS=$(wakatime --today)

          # Replace content between markers with stats
          awk -v start="$START" -v end="$END" -v stats="$STATS" '
            {print}
            $0 ~ start {print stats; getline; while($0 !~ end) getline}
          ' $FILE > temp.md
          mv temp.md $FILE

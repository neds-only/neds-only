name: WakaTime Readme

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:     # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the WakaTime action with specific CLI version
      - uses: athul/waka-readme@latest
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          WAKATIME_CLI_VERSION: 14.0.1   # <-- explicitly set your version
          SHOW_TITLE: true
          SHOW_TIME_ZONE: false
          SHOW_LANGUAGE: true
          SHOW_OS: true
          SHOW_PROJECTS: true
          SHOW_EDITORS: true
